let soalAktif = [], indeksSoal = 0, jawabanUser = [], skorPG = 0, totalPG = 0;

function initMenu() {
    const container = document.getElementById('menu-container');
    const kategoriUnik = [...new Set(databaseSoal.map(s => s.kategori))];
    kategoriUnik.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'btn-outline';
        btn.innerText = k;
        btn.onclick = () => startQuiz(k);
        container.appendChild(btn);
    });
}

function startQuiz(k) {
    soalAktif = k === 'Semua Topik' ? [...databaseSoal] : databaseSoal.filter(s => s.kategori === k);
    indeksSoal = 0; jawabanUser = new Array(soalAktif.length).fill(null);
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('current-category-text').innerText = k;
    renderSoal();
}

function renderSoal() {
    const s = soalAktif[indeksSoal];
    document.getElementById('question-counter').innerText = `Soal ${indeksSoal + 1} / ${soalAktif.length}`;
    document.getElementById('progress-bar').style.width = `${((indeksSoal + 1) / soalAktif.length) * 100}%`;
    document.getElementById('question-text').innerText = s.pertanyaan;
    const container = document.getElementById('answer-container');
    container.innerHTML = '';

    if (s.tipe === 'esai') {
        const txt = document.createElement('textarea');
        txt.className = 'essay-input';
        txt.value = jawabanUser[indeksSoal] || '';
        txt.oninput = (e) => { jawabanUser[indeksSoal] = e.target.value; };
        container.appendChild(txt);
    } else {
        const div = document.createElement('div'); div.className = 'options-list';
        s.pilihan.forEach(o => {
            const lbl = document.createElement('label'); lbl.className = 'option-item';
            if (jawabanUser[indeksSoal] === o) lbl.classList.add('selected');
            lbl.onclick = () => { 
                jawabanUser[indeksSoal] = o; 
                document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
                lbl.classList.add('selected');
            };
            const inp = document.createElement('input'); inp.type = 'radio'; inp.name = 'q'; inp.checked = (jawabanUser[indeksSoal] === o);
            lbl.append(inp, o); div.appendChild(lbl);
        });
        container.appendChild(div);
    }
    document.getElementById('btn-prev').style.visibility = indeksSoal === 0 ? 'hidden' : 'visible';
    document.getElementById('btn-next').style.display = indeksSoal === soalAktif.length - 1 ? 'none' : 'block';
    document.getElementById('btn-lihat-hasil').style.display = indeksSoal === soalAktif.length - 1 ? 'block' : 'none';
}

function nextQuestion() { if (indeksSoal < soalAktif.length - 1) { indeksSoal++; renderSoal(); } }
function prevQuestion() { if (indeksSoal > 0) { indeksSoal--; renderSoal(); } }

function showResults() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    skorPG = 0; totalPG = soalAktif.filter(s => s.tipe === 'pg').length;
    const container = document.getElementById('review-container'); container.innerHTML = '';
    
    soalAktif.forEach((s, i) => {
        const u = jawabanUser[i] || "(Tidak dijawab)";
        const card = document.createElement('div'); card.className = 'review-card';
        let isWrong = s.tipe === 'pg' && u !== s.kunci_jawaban;
        if (isWrong) card.classList.add('wrong-pg');
        if (s.tipe === 'pg' && u === s.kunci_jawaban) skorPG++;

        card.innerHTML = `
            <div class="review-q"><span>${i+1}. ${s.pertanyaan}</span><span class="review-badge">${s.tipe.toUpperCase()}</span></div>
            <div style="font-size:12px; color:#666">Jawaban Anda:</div>
            <div class="ans-user">${u} ${isWrong ? '<span style="color:red; font-weight:bold">(Salah)</span>' : ''}</div>
            ${isWrong ? `<div class="ans-correct">Jawaban Benar: ${s.kunci_jawaban}</div>` : ''}
            <div style="font-size:12px; color:#666; margin-top:10px">Kunci / Referensi:</div>
            <div class="ans-ref">${s.kunci_jawaban}</div>
        `;
        container.appendChild(card);
    });
    document.getElementById('score-category-name').innerText = document.getElementById('current-category-text').innerText;
    document.getElementById('score-text-total').innerText = `${skorPG} / ${totalPG}`;
}
initMenu();
</script>
